name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: bunker.mantracare.com
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: bunker.mantracare.com/lovable/vibe_tracker:1.0
          build-args: |
            VITE_NEON_API_KEY=${{ secrets.VITE_NEON_API_KEY }}
            VITE_NEON_PROJECT_ID=${{ secrets.VITE_NEON_PROJECT_ID }}
            VITE_NEON_BRANCH_ID=${{ secrets.VITE_NEON_BRANCH_ID }}
            VITE_AUTH_API_URL=${{ secrets.VITE_AUTH_API_URL }}
